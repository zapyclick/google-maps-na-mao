<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps na Mão</title>
    <!-- Link para os arquivos de estilo (CSS) -->
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- CABEÇALHO DA PÁGINA -->
<header>

</header>

<!-- CONTEÚDO PRINCIPAL DO APLICATIVO -->
<main>
  <!-- Título da seção principal -->
  <h1>Crie sua Próxima Postagem para o Google</h1>

  <!-- Formulário de criação de post -->
  <form id="post-form">

    <!-- Campo de texto para a descrição do post -->
    <div class="form-group">
      <label for="post-text">Texto da Postagem (Opcional):</label>
      <textarea id="post-text" name="post-text" rows="8" placeholder="Ex: Aproveite nossa promoção de 20% de desconto em todos os cafés! Válido somente esta semana. #promo #café"></textarea>
    </div>

    <!-- Área de upload de imagem -->
    <div class="form-group">
      <label for="post-image">Imagem da Postagem:</label>
      <div id="image-uploader" class="image-drop-zone">
        <p>Arraste e solte uma imagem aqui ou clique para selecionar</p>
        <input type="file" id="post-image" name="post-image" accept="image/*" hidden>
      </div>
      <div id="image-preview" class="image-preview-container" hidden>
  <!-- A imagem selecionada aparecerá aqui via JavaScript -->
  <button type="button" id="change-image-button">Escolher outra imagem</button>
</div>

    <!-- Botão para submeter o formulário -->
    <button type="submit" id="submit-button">Gerar Postagem</button>

  </form>
</main>

<!-- RODAPÉ DA PÁGINA -->
<footer>

</footer>

<!-- Link para o arquivo de script (JavaScript) -->
<script src="script.js"></script>

</body>
</html>
